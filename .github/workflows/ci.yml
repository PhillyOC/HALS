name: PowerShell validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell sources
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -File -Include *.ps1,*.psm1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $failed = $true
              Write-Error "$($_.FullName): $($errors -join '; ')"
            }
          }
          if ($failed) { exit 1 }
